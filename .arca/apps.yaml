apiVersion: arca.coreweave.com/v1alpha1
kind: AppManifest
spec:
  apps:
    - name: nginx
      path: ./apps/nginx
      type: kustomize
      targets:
        - cluster: arca-customer
          namespace: default
      syncPolicy:
        interval: 5m
        prune: true
        selfHeal: true

    - name: cert-manager
      type: helm
      path: ./apps/cert-manager
      helm:
        chart: cert-manager
        repoURL: https://charts.jetstack.io
        version: v1.17.1
        releaseName: cert-manager
        valuesFiles:
          - ./values.yaml
      targets:
        - cluster: arca-customer
          namespace: cert-manager
      syncPolicy:
        interval: 5m
        prune: true
        selfHeal: true

    - name: traefik
      type: helm
      path: ./apps/traefik
      helm:
        chart: traefik
        repoURL: https://helm.traefik.io/traefik
        version: 34.4.0
        releaseName: traefik
        valuesFiles:
          - ./values.yaml
      targets:
        - cluster: arca-customer
          namespace: traefik
      syncPolicy:
        interval: 5m
        prune: true
        selfHeal: true

    - name: prometheus
      type: helm
      path: ./apps/prometheus
      helm:
        chart: prometheus
        repoURL: https://prometheus-community.github.io/helm-charts
        version: 27.5.1
        releaseName: prometheus
        valuesFiles:
          - ./values.yaml
      targets:
        - cluster: arca-customer
          namespace: monitoring
      syncPolicy:
        interval: 5m
        prune: true
        selfHeal: true

    - name: metrics-server
      path: ./apps/metrics-server
      type: kustomize
      targets:
        - cluster: arca-customer
          namespace: kube-system
      syncPolicy:
        interval: 5m
        prune: true
        selfHeal: true
